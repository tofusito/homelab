services:
  claude-assistant:
    build: .
    container_name: claude-assistant
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # control de Docker del host
      - /home/tofu/docker:/home/tofu/docker          # stacks del homelab
      - claude-auth:/home/claude/.claude             # persistir auth, plugins y pairing de Telegram
    tty: true
    stdin_open: true
    working_dir: /home/tofu/docker
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "claude"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  claude-auth:
    name: claude-auth
